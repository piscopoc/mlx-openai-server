server:
  host: "0.0.0.0"
  port: 9001
  log_level: INFO
  default_lazy_load: true
  default_idle_timeout_seconds: 900

models:
  # Text/Language Models
  - model_path: /Volumes/LLMS/text/mlx-community/Qwen3-4B-bf16
    model_type: lm
    model_id: qwen3-4b-bf16
    lazy_load: true
    idle_timeout_seconds: 900

  - model_path: /Volumes/LLMS/text/mlx-community/Devstral-Small-2-24B-Instruct-2512-4bit
    model_type: lm
    model_id: devstral-2-24b-4bit
    lazy_load: true
    idle_timeout_seconds: 900

  - model_path: /Volumes/LLMS/text/mlx-community/gemma-3-1b-it-4bit-DWQ
    model_type: lm
    model_id: gemma-3-1b-4bit
    lazy_load: true
    idle_timeout_seconds: 900

  - model_path: /Volumes/LLMS/text/mlx-community/GLM-4.7-Flash-4bit
    model_type: lm
    model_id: glm-4.7-flash-4bit
    lazy_load: true
    idle_timeout_seconds: 900

  - model_path: /Volumes/LLMS/text/mlx-community/gpt-oss-20b-MXFP4-Q8
    model_type: lm
    model_id: gpt-oss-20b-q8
    lazy_load: true
    idle_timeout_seconds: 900

  - model_path: /Volumes/LLMS/text/mlx-community/mistralai_Ministral-3-14B-Instruct-2512-MLX-MXFP4
    model_type: lm
    model_id: ministral-3-14b-4bit
    lazy_load: true
    idle_timeout_seconds: 900

  # Embedding Models
  - model_path: /Volumes/LLMS/embedding/mlx-community/Qwen3-Embedding-4B-4bit-DWQ
    model_type: embeddings
    model_id: qwen3-embedding-4b
    lazy_load: true
    idle_timeout_seconds: 900

  # Image Generation Models
  - model_path: /Volumes/LLMS/image/black-forest-labs/FLUX.2-klein-4B
    model_type: image-generation
    config_name: flux2-klein-4b
    quantize: 4
    model_id: flux2-klein-4b
    lazy_load: true
    idle_timeout_seconds: 900

  - model_path: /Volumes/LLMS/image/filipstrand/FLUX.1-Krea-dev-mflux-4bit
    model_type: image-generation
    config_name: flux1-krea-dev-4bit
    quantize: 4
    model_id: flux1-krea-dev-4bit
    lazy_load: true
    idle_timeout_seconds: 900

  - model_path: /Volumes/LLMS/image/filipstrand/Qwen-Image-mflux-6bit
    model_type: image-generation
    config_name: qwen-image-mflux-6bit
    quantize: 6
    model_id: qwen-image-mflux-6bit
    lazy_load: true
    idle_timeout_seconds: 900

  - model_path: /Volumes/LLMS/image/filipstrand/Z-Image-Turbo-mflux-4bit
    model_type: image-generation
    config_name: z-image-turbo-4bit
    quantize: 4
    model_id: z-image-turbo-4bit
    lazy_load: true
    idle_timeout_seconds: 900
